<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>חיפוש שולחן — דניאל ולירון</title>
<style>
:root{--bg:#F7F2EC;--card:#FFFDF9;--warm:#E9DED0;--warm2:#D8C8B8;--gold:#B8966A;--gold-l:#F3E7D6;--gold-d:#7A5F38;--ink:#1E1610;--ink2:#4A3B2C;--muted:#8A7868;--sage:#5E826A;--sage-l:#E6F2EA;--shadow:0 18px 44px rgba(64,45,27,.10);--small:0 8px 22px rgba(64,45,27,.08)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{min-height:100%;background:var(--bg)}
body{margin:0;min-height:100%;font-family:Arial,"Heebo",sans-serif;color:var(--ink);background:radial-gradient(900px 500px at 12% 8%,rgba(184,150,106,.15),transparent 60%),radial-gradient(700px 480px at 88% 78%,rgba(94,130,106,.10),transparent 60%),linear-gradient(135deg,#FBF8F3,#F4EDE5)}
.app{width:min(760px,100%);margin:0 auto;min-height:100vh;min-height:100dvh;padding:18px 14px 22px;display:flex;flex-direction:column;gap:14px}
.hero{background:rgba(255,253,249,.88);border:1px solid rgba(216,200,184,.86);border-radius:28px;padding:20px 17px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:auto -80px -130px auto;width:220px;height:220px;background:rgba(184,150,106,.16);border-radius:50%}.kicker{font-size:12px;font-weight:800;color:var(--gold-d);letter-spacing:.08em}.title{font-size:28px;font-weight:900;letter-spacing:-.04em;margin:6px 0 2px}.sub{font-size:14px;color:var(--muted);line-height:1.55}.status{display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:var(--sage-l);color:var(--sage);border:1px solid rgba(94,130,106,.25);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800}.dot{width:8px;height:8px;border-radius:50%;background:var(--sage);box-shadow:0 0 0 5px rgba(94,130,106,.12)}
.search-card{background:#fff;border:1px solid rgba(216,200,184,.88);border-radius:26px;padding:13px;box-shadow:var(--small);position:sticky;top:10px;z-index:4}.search-row{display:flex;align-items:center;gap:9px;background:#FBF8F3;border:1px solid var(--warm2);border-radius:21px;padding:8px 11px}.search-ico{font-size:18px}.search-input{flex:1;min-width:0;border:0;background:transparent;outline:0;font:800 20px/1.3 Arial,"Heebo",sans-serif;color:var(--ink);padding:8px 0;text-align:right;-webkit-appearance:none;appearance:none}.search-input::placeholder{color:#B7A696;font-weight:700}.search-btn,.clear{border:0;border-radius:999px;font:900 13px Arial,"Heebo",sans-serif;line-height:1;cursor:pointer}.search-btn{background:#201712;color:white;padding:10px 13px;white-space:nowrap}.clear{background:var(--warm);color:var(--ink2);width:30px;height:30px;font-size:18px;display:none}.clear.show{display:block}.hint{font-size:12px;color:var(--muted);padding:9px 4px 1px;line-height:1.45}
.results{display:flex;flex-direction:column;gap:11px}.empty{background:rgba(255,253,249,.75);border:1px dashed var(--warm2);border-radius:24px;text-align:center;padding:32px 18px;color:var(--muted);font-weight:700;line-height:1.7}.empty strong{color:var(--ink)}
.result,.choice-wrap{background:rgba(255,253,249,.93);border:1px solid rgba(216,200,184,.9);border-radius:26px;padding:15px;box-shadow:var(--small);animation:in .18s ease}@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.choice-wrap{display:flex;flex-direction:column;gap:9px}.choice-title{font-size:17px;font-weight:950;color:var(--ink);line-height:1.35}.choice-sub{font-size:12px;color:var(--muted);font-weight:750;line-height:1.5;margin-top:-3px}.choice{width:100%;border:1px solid var(--warm2);background:#FBF8F3;border-radius:18px;padding:12px;text-align:right;font-family:Arial,"Heebo",sans-serif;cursor:pointer;display:flex;flex-direction:column;gap:5px;color:var(--ink)}.choice:active{transform:scale(.99)}.choice-name{font-size:17px;font-weight:950;line-height:1.25}.choice-meta{font-size:12px;color:var(--muted);font-weight:800;line-height:1.45}.choice-table{display:inline-flex;align-items:center;gap:5px;align-self:flex-start;background:var(--gold-l);color:var(--gold-d);border:1px solid rgba(184,150,106,.42);border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900}
.matched{font-size:13px;color:var(--muted);font-weight:750;margin-bottom:6px}.guest-name{font-size:23px;font-weight:950;line-height:1.2;letter-spacing:-.03em}.group-line{margin-top:5px;font-size:15px;color:var(--ink2);font-weight:800}.group-line .label{color:var(--gold-d)}.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin:13px 0}.pill{display:inline-flex;align-items:center;gap:6px;background:var(--gold-l);border:1px solid rgba(184,150,106,.45);color:var(--gold-d);border-radius:999px;padding:7px 10px;font-size:13px;font-weight:900}.pill.sage{background:var(--sage-l);border-color:rgba(94,130,106,.35);color:var(--sage)}.info-grid{display:grid;grid-template-columns:1fr;gap:9px}.info{border:1px solid var(--warm2);background:#FBF8F3;border-radius:18px;padding:11px 12px}.info-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;margin-bottom:4px}.info-text{font-size:16px;line-height:1.5;font-weight:850;color:var(--ink2)}.route{border-color:rgba(94,130,106,.28);background:linear-gradient(135deg,#F7FBF8,#FFFDF9)}.route .info-title{color:var(--sage)}.actions{display:flex;gap:8px;margin-top:12px}.copy-btn{flex:1;border:0;border-radius:17px;background:linear-gradient(135deg,#2A211B,#17100B);color:white;font:900 14px Arial,"Heebo",sans-serif;padding:12px 14px;cursor:pointer}.map-note{font-size:11px;color:var(--muted);line-height:1.55;margin-top:9px}.footer{font-size:11px;color:var(--muted);text-align:center;line-height:1.6;padding:3px 10px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(80px);background:#201712;color:white;border-radius:999px;padding:10px 15px;font-size:13px;font-weight:800;box-shadow:var(--shadow);transition:.25s;z-index:20}.toast.show{transform:translateX(-50%) translateY(0)}
@media(min-width:620px){.info-grid{grid-template-columns:1fr 1fr}.route{grid-column:1/-1}.title{font-size:32px}.search-input{font-size:22px}.app{padding-top:28px}}
@media(max-width:390px){.title{font-size:24px}.guest-name{font-size:20px}.search-input{font-size:18px}.hero,.search-card,.result{border-radius:22px}.search-btn{padding:10px 10px}}
</style>
</head>

<div class="app">
  <section class="hero">
    <div class="kicker">דניאל & לירון · 27.5.2026</div>
    <h1 class="title">איפה השולחן שלי?</h1>
    <div class="sub">רשמו שם פרטי, שם משפחה, או שם של מלווה. המיקום מחושב לפי <b>כניסה לאולם</b> כנקודת ייחוס.</div>
    <div class="status" id="data-status"><span class="dot"></span><span>מוכן לחיפוש</span></div>
  </section>
  <section class="search-card">
    <div class="search-row">
      <span class="search-ico">🔎</span>
      <input id="q" class="search-input" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="לדוגמה: לירון חזום">
      <button id="clear" class="clear" type="button" aria-label="נקה">×</button>
      <button id="go" class="search-btn" type="button">חפש</button>
    </div>
    <div class="hint">אם יש כמה אורחים עם אותו שם — כולם יוצגו. אם השם הוא מלווה בתוך קבוצה, יוצג גם ראש הקבוצה.</div>
  </section>
  <section id="results" class="results"></section>
  <div class="footer">דניאל ולירון · חיפוש שולחן לאורחים</div>
</div>

  for(i=0;i<guests.length;i++){g=guests[i]||{};ng={id:g.id,name:String(g.name||''),companionName:String(g.companionName||''),rel:g.rel||'',tid:(g.tid!=null?g.tid:null),vip:!!g.vip,rsvp:g.rsvp||'yes',maybe:!!g.maybe,notAttending:!!g.notAttending,seats:Number(g.seats||1)};if(ng.name&&!isNo(ng))gs.push(ng)}
  for(i=0;i<tables.length;i++){t=tables[i]||{};ts.push({id:t.id,num:(t.num!=null?t.num:t.number)||'',name:String(t.name||''),tableName:(t.tableName!=null?t.tableName:(t.titleName!=null?t.titleName:t.labelName))||'',cap:Number(t.cap||0),x:Number(t.x||50),y:Number(t.y||50),reserve:Number(t.reserve||0),locNote:String(t.locNote||t.locationNote||t.zone||''),routeNote:String(t.routeNote||t.directionNote||'')})}
  for(i=0;i<elements.length;i++){e=elements[i]||{};es.push({id:e.id,type:e.type||'',label:String(e.label||''),x:Number(e.x||50),y:Number(e.y||50),w:Number(e.w||0),h:Number(e.h||0)})}
  return {version:1,meta:{title:src.title||'דניאל ולירון',createdAt:new Date().toISOString()},guests:gs,tables:ts,elements:es};
}
function setState(s){state=cleanBackup(s);updateDataStatus();renderResults()}
function loadInitial(){try{if(EMBEDDED_B64&&EMBEDDED_B64!=='__EMBEDDED_DATA__'){setState(JSON.parse(textFromB64(EMBEDDED_B64)));return}}catch(e){console.log('data load failed',e)}updateDataStatus();renderResults()}
function updateDataStatus(){var active=0,i;for(i=0;i<state.guests.length;i++){if(!isNo(state.guests[i]))active++}var el=byId('data-status');if(!el)return;if(!active)el.innerHTML='<span class="dot" style="background:#B8966A"></span><span>אין נתונים — פנו למארחים</span>';else el.innerHTML='<span class="dot"></span><span>מוכן לחיפוש</span>'}
function clearSearch(){selectedResultId=null;lastQueryNorm='';byId('q').value='';renderResults();var up=byId('updated');if(up)up.textContent=updatedLabel();try{byId('q').focus()}catch(e){}}
function searchGuests(q){
  var nq=norm(q);if(!nq)return [];
  var active=[], i, j, blob, res=[], tokens=nq.split(' ').filter(function(x){return x.length>1});
  for(i=0;i<state.guests.length;i++){if(!isNo(state.guests[i]))active.push(state.guests[i])}
  for(i=0;i<active.length;i++){if(searchBlob(active[i]).indexOf(nq)>=0)res.push(active[i])}
  if(!res.length&&tokens.length){var first=tokens[0];for(i=0;i<active.length;i++){if(searchBlob(active[i]).indexOf(first)>=0)res.push(active[i])}}
  if(!res.length&&tokens.length>1){for(i=0;i<active.length;i++){blob=searchBlob(active[i]);for(j=0;j<tokens.length;j++){if(blob.indexOf(tokens[j])>=0){res.push(active[i]);break}}}}
  res=uniqueSearchResults(res);
  function score(g){var txt=searchBlob(g),dn=norm(displayName(g)),s=0;if(dn===nq)s-=80;else if(dn.indexOf(nq)===0)s-=55;else if(txt.indexOf(nq)>=0)s-=25;if(g.tid)s-=15;if(hasNamedCompanion(g))s-=4;if(!g.tid)s+=18;return s}
  res.sort(function(a,b){var x=score(a)-score(b);if(x)return x;return String(displayName(a)).localeCompare(String(displayName(b)),'he')});return res.slice(0,40)
}
function entrance(){var i,e,n;for(i=0;i<state.elements.length;i++){e=state.elements[i];n=norm((e.type||'')+' '+(e.label||''));if(n.indexOf('entrance')>=0||n.indexOf('כניסה לאולמ')>=0||n.indexOf('כניסה ראשית')>=0||n.indexOf('כניסה')>=0)return {x:Number(e.x||50),y:Number(e.y||90),label:e.label||'כניסה לאולם'}}return {x:50,y:92,label:'כניסה לאולם'}}
function tableRowIndex(t,ent){var ys=[],i,j,y,groups=[],found;for(i=0;i<state.tables.length;i++){y=Number(state.tables[i].y);if(isFinite(y))ys.push(y)}if(!ys.length)return 1;ys.sort(function(a,b){return Math.abs(a-Number(ent.y))-Math.abs(b-Number(ent.y))});for(i=0;i<ys.length;i++){found=null;for(j=0;j<groups.length;j++){if(Math.abs(groups[j][0]-ys[i])<=7){found=groups[j];break}}if(found)found.push(ys[i]);else groups.push([ys[i]])}groups.sort(function(a,b){return Math.abs(a[0]-Number(ent.y))-Math.abs(b[0]-Number(ent.y))});for(i=0;i<groups.length;i++){if(Math.abs(groups[i][0]-Number(t.y))<=7)return i+1}return Math.max(1,Math.ceil(Math.abs(Number(ent.y)-Number(t.y))/16))}
function hebRow(n){var arr=['ראשונה','שנייה','שלישית','רביעית','חמישית','שישית','שביעית'];return arr[n-1]||String(n)}
function locationFor(t){if(!t)return {pos:HELP_TEXT,dir:HELP_ROUTE};var manualPos=String(t.locNote||'').trim();var manualDir=String(t.routeNote||'').trim();if(manualPos||manualDir){return {pos:manualPos||HELP_TEXT,dir:manualDir||autoRouteFor(t)}}var ent=entrance();var dx=Number(t.x)-Number(ent.x);var dy=Number(t.y)-Number(ent.y);var side=Math.abs(dx)<8?'במרכז':(dx>0?'מימין':'משמאל');var row=tableRowIndex(t,ent);var pos='שורה '+hebRow(row)+' '+side;var dir=autoRouteFor(t);return {pos:pos,dir:dir}}
function autoRouteFor(t){if(!t)return HELP_ROUTE;var ent=entrance();var dx=Number(t.x)-Number(ent.x);var dy=Number(t.y)-Number(ent.y);var row=tableRowIndex(t,ent);var dir='';if(Math.abs(dx)<8)dir='מהכניסה לאולם הולכים ישר עד השולחן.';else if(row<=1)dir='מהכניסה לאולם פונים '+(dx>0?'ימינה':'שמאלה')+' והשולחן קרוב לכניסה.';else dir='מהכניסה לאולם הולכים ישר ואז פונים '+(dx>0?'ימינה':'שמאלה')+'.';if(Math.abs(dy)<9&&Math.abs(dx)>=8)dir='מהכניסה לאולם פונים '+(dx>0?'ימינה':'שמאלה')+' וממשיכים מעט.';return dir}
function resultText(g){var t=tableById(g.tid);var loc=locationFor(t);var who=isCompanionGuest(g)?groupLeaderName(g)+':\n'+displayName(g):displayName(g);return who+'\nשולחן: '+tableLabel(t)+'\nמיקום: '+loc.pos+'\nהוראות הגעה: '+loc.dir}
function renderChoices(list){var html='<div class="choice-wrap"><div class="choice-title">נמצאו כמה אפשרויות. מי האורח?</div><div class="choice-sub">בחרו את השם המדויק, ואז יוצגו מספר השולחן והוראות ההגעה.</div>';var i,g,t,gid;for(i=0;i<list.length;i++){g=list[i];t=tableById(g.tid);gid=escapeHTML(String(g.id));html+='<button type="button" class="choice" data-result-id="'+gid+'" onclick="selectResult(\''+gid+'\')"><span class="choice-name">'+escapeHTML(displayName(g))+'</span><span class="choice-meta">'+(hasNamedCompanion(g)?'ראש הקבוצה: '+escapeHTML(groupLeaderName(g)):'אורח')+'</span><span class="choice-table">🪑 '+escapeHTML(tableLabel(t))+'</span></button>'}return html+'</div>'}
function renderCard(g){var t=tableById(g.tid),loc=locationFor(t),comp=isCompanionGuest(g),guest=escapeHTML(displayName(g)),leader=escapeHTML(groupLeaderName(g));var html='<article class="result"><div class="matched">'+(comp?'מלווה / חלק מקבוצה':'אורח')+'</div><div class="guest-name">'+guest+'</div>';if(comp)html+='<div class="group-line"><span class="label">ראש הקבוצה:</span> '+leader+'</div>';html+='<div class="pill-row"><span class="pill">🪑 '+escapeHTML(tableLabel(t))+'</span>'+(g.vip?'<span class="pill sage">VIP</span>':'')+'</div><div class="info-grid"><div class="info"><div class="info-title">מספר שולחן</div><div class="info-text">'+escapeHTML(tableLabel(t))+'</div></div><div class="info"><div class="info-title">מיקום באולם</div><div class="info-text">'+escapeHTML(loc.pos)+'</div></div><div class="info route"><div class="info-title">הוראות הגעה קצרות</div><div class="info-text">'+escapeHTML(loc.dir)+'</div></div></div><div class="actions"><button class="copy-btn" type="button" data-copy-id="'+escapeHTML(String(g.id))+'" onclick="copyResult(\''+escapeHTML(String(g.id))+'\')">העתק פרטים</button></div><div class="map-note">נקודת הייחוס: כניסה לאולם. המיקום הוא תיאור קצר לפי מיקום השולחן במפה.</div></article>';return html}
function updatedLabel(){try{var d=state.createdAt?new Date(state.createdAt):null;if(d&&!isNaN(d.getTime()))return 'עודכן: '+d.toLocaleString('he-IL');}catch(e){}return ''}
function renderResults(){var q=byId('q').value||'',nq=norm(q),clear=byId('clear'),box=byId('results'),res,i;if(nq!==lastQueryNorm){selectedResultId=null;lastQueryNorm=nq}if(clear)clear.className=q?'clear show':'clear';if(!state.guests.length){box.innerHTML='<div class="empty"><strong>עדיין אין נתונים.</strong><br>פנו למארחת בכניסה או לנטע המפיקה.</div>';return}if(!q.replace(/\s+/g,'').length){box.innerHTML='<div class="empty"><strong>רשמו שם כדי להתחיל.</strong><br>אפשר לחפש גם מלווה שנמצא תחת +1 / +2.</div>';return}res=searchGuests(q);if(!res.length){box.innerHTML='<div class="empty"><strong>פנו למארחת בכניסה או לנטע המפיקה.</strong><br>הצוות בכניסה יעזור לכם למצוא את מקום הישיבה.</div>';return}if(selectedResultId){for(i=0;i<res.length;i++){if(String(res[i].id)===String(selectedResultId)){box.innerHTML=renderCard(res[i]);return}}}if(res.length===1){box.innerHTML=renderCard(res[0]);return}box.innerHTML=renderChoices(res)}
function selectResult(id){selectedResultId=String(id);renderResults();setTimeout(function(){try{byId('results').scrollIntoView({behavior:'smooth',block:'start'})}catch(e){}},30)}
function copyResult(id){var g=null,i,txt,ta;for(i=0;i<state.guests.length;i++){if(String(state.guests[i].id)===String(id)){g=state.guests[i];break}}if(!g)return;txt=resultText(g);if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){toast('הפרטים הועתקו')}).catch(function(){fallbackCopy(txt)})}else fallbackCopy(txt)}
function fallbackCopy(txt){try{var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('הפרטים הועתקו')}catch(e){toast('העתקה לא זמינה במכשיר הזה')}}
function findAttrButton(el,attr){while(el&&el!==document){if(el.getAttribute&&el.getAttribute(attr))return el;el=el.parentNode}return null}
function bindEvents(){var q=byId('q'), clear=byId('clear'), go=byId('go');document.addEventListener('click',function(e){var btn=findAttrButton(e.target,'data-result-id');if(btn){e.preventDefault();selectResult(btn.getAttribute('data-result-id'));return}var cp=findAttrButton(e.target,'data-copy-id');if(cp){e.preventDefault();copyResult(cp.getAttribute('data-copy-id'));return}});if(q){q.addEventListener('input',renderResults);q.addEventListener('keyup',renderResults);q.addEventListener('change',renderResults);q.addEventListener('search',renderResults);q.addEventListener('compositionend',renderResults);q.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();renderResults();try{q.blur()}catch(x){}}})}if(clear)clear.addEventListener('click',clearSearch);if(go)go.addEventListener('click',function(){renderResults();try{q.blur()}catch(e){}})}
bindEvents();
loadInitial();
</script>
